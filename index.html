<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AsIVision – דף הבית</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container landing">

    <!-- לוגו -->
    <img class="logo" src="images/logo-asivision.png" alt="AsIVision Logo" />

    <!-- אזור המסכים -->
    <div class="monitor-area">
      <div class="monitors-row">
        <div class="monitor left"></div>
        <div class="monitor center"></div>
        <div class="monitor right"></div>
      </div>

      <!-- קווי חיבור (כמו n8n) -->
      <div class="connector connector-left"></div>
      <div class="connector connector-right"></div>
    </div>

    <!-- מקלדת ניווט -->
    <div class="keyboard-wrap">
      <div class="keyboard-rows">
        <div class="keyboard-row">
          <a class="key" href="index.html">אזור אישי</a>
          <a class="key" href="about.html">אודות</a>
          <a class="key" href="examples.html">דוגמאות</a>
          <a class="key" href="community.html">קהילה / בלוג</a>
          <a class="key" href="contact.html">צור קשר</a>
        </div>
        <div class="keyboard-row">
          <a class="key key-cta" href="contact.html">בוא נבנה את הפרויקט הבא שלך</a>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
